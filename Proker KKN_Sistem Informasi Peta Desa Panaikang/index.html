<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Desa Panaikang</title>

       <!-- leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        <!-- compass -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-compass/dist/leaflet-compass.min.css" />
    <script src="https://unpkg.com/leaflet-compass/dist/leaflet-compass.min.js"></script>

        <!-- miniMap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-minimap/dist/Control.MiniMap.min.css" />
    <script src="https://unpkg.com/leaflet-minimap/dist/Control.MiniMap.min.js"></script>

        <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
        
        
    <!-- tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind = { config: {
            theme: {
            extend: {
                colors: {
                hutan:  '#063526',
                sawah:  '#356946',
                padi:   '#C9A45C',
                kertas: '#F6F3EA',
                tunas:  '#6FA37A',
                },
                fontFamily: {
                display: ['Fraunces', 'serif'],
                sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                mono: ['"IBM Plex Mono"', 'monospace'],
                },
            },
            },
        } };
    </script>

    <style>
        ::-webkit-scrollbar{ width:6px; }
        ::-webkit-scrollbar-thumb{ background:#C9A45C; border-radius:4px; }
        ::-webkit-scrollbar-track{ background:transparent; }
        .leaflet-popup-content-wrapper{ background:#063526; color:#F6F3EA; font-family:'Plus Jakarta Sans', sans-serif; }
        .leaflet-popup-tip{ background:#063526; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col text-kertas bg-gradient-to-tr from-[#010b08] via-[#04241a] to-[#133520] antialiased">
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-sawah/10 via-transparent to-transparent pointer-events-none z-0"></div>
  <div class="relative z-10 flex flex-col h-full">

  <!-- Header -->
  <header class="shrink-0 px-6 md:px-10 pt-4 pb-2 text-center">
    <p class="font-mono text-[10px] tracking-[0.3em] uppercase text-padi mb-1">
      Kabupaten Pangkep &middot; Kecamatan Minasatene
    </p>
    <h1 class="font-display text-base md:text-xl font-semibold leading-tight text-kertas">
      Peta Digital Desa Panaikang
    </h1>
    <!-- <p class="mt-1 text-xs md:text-sm text-kertas/70 max-w-xl mx-auto">
      Sistem informasi spasial batas wilayah, fasilitas, dan jalur desa
    </p> -->
  </header>

  <div class="shrink-0 w-full max-w-2xl h-[8px] mx-auto mb-3 rounded-full opacity-55 bg-[length:10px_14px] bg-[linear-gradient(135deg,#C9A45C_25%,transparent_25%),linear-gradient(225deg,#C9A45C_25%,transparent_25%)]"> </div>

  <!-- Map Section -->
  <main class="flex-1 min-h-0 mx-4 md:mx-10 mb-3 relative z-10">
    <div class="w-full h-full rounded-2xl overflow-hidden relative shadow-2xl shadow-black/40 border border-padi/20">

      <!-- Map -->
      <div id="map" class="w-full h-full absolute inset-0 z-10"></div>

      <!-- Control Panel -->
      <div id="mapControls"
        class="absolute top-3 left-3 z-30 rounded-lg p-3 w-[200px] max-h-[calc(100%-1.5rem)] overflow-y-auto space-y-3 shadow-xl
               bg-hutan/70 backdrop-blur-md border border-padi/25">

        <!-- Pencarian -->
        <div>
          <div class="flex items-center space-x-1.5 mb-1.5">
            <div class="w-1 h-1 bg-padi rounded-full"></div>
            <span class="font-mono text-[12px] uppercase tracking-wider text-padi">Cari Lokasi</span>
          </div>

          <div class="relative">
            <input type="text" id="searchInput" placeholder="Masukkan lokasi..." class="w-full px-2.5 py-1.5 rounded-md text-kertas text-xs border border-padi/20 outline-none bg-kertas/5 placeholder:text-kertas/40 transition-all duration-200 focus:border-padi focus:ring-2 focus:ring-padi/20">
            <div class="absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none">
              <svg class="w-3.5 h-3.5 text-kertas/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
            </div>
          </div>

          <ul id="searchResults"
            class="z-50 bg-hutan text-kertas text-[11px] w-full max-h-44 overflow-y-auto mt-1 rounded-md shadow-lg border border-padi/20 hidden divide-y divide-padi/10">
          </ul>
          <ul id="selectedResults" class="mt-1 space-y-1 text-[11px] text-kertas/80"></ul>
        </div>

        <!-- Pilih Layer -->
        <div class="relative">
          <div class="flex items-center space-x-1.5 mb-1.5">
            <div class="w-1 h-1 bg-padi rounded-full"></div>
            <span class="font-mono text-[11px] uppercase tracking-wider text-padi">Pilih Layer</span>
          </div>

          <button id="dropdownBtn" onclick="toggleDropdown()" class="w-full flex items-center justify-between px-2.5 py-1.5 rounded-md text-kertas text-xs font-medium border border-padi/20 outline-none bg-kertas/5 focus:border-padi text-left">
            <span id="dropdownLabel">Semua Layer Terpilih</span>
            <svg class="w-3 h-3 text-padi transition-transform duration-200" id="dropdownArrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>

          <div id="dropdownMenu" class="absolute left-0 right-0 mt-1 bg-hutan border border-padi/25 rounded-md shadow-2xl p-2 space-y-2 z-50 hidden max-h-[200px] overflow-y-auto">
            
            <label class="flex items-center space-x-2 text-xs text-kertas/90 cursor-pointer select-none py-0.5 hover:bg-kertas/5 px-1 rounded">
              <input type="checkbox" value="fasilitas" class="layer-checkbox rounded border-padi text-hutan focus:ring-padi" checked>
              <span>Fasilitas Desa</span>
            </label>

            <label class="flex items-center space-x-2 text-xs text-kertas/90 cursor-pointer select-none py-0.5 hover:bg-kertas/5 px-1 rounded">
              <input type="checkbox" value="wilayah" class="layer-checkbox rounded border-padi text-hutan focus:ring-padi" checked>
              <span>Batas Wilayah</span>
            </label>

            <label class="flex items-center space-x-2 text-xs text-kertas/90 cursor-pointer select-none py-0.5 hover:bg-kertas/5 px-1 rounded">
              <input type="checkbox" value="jalan" class="layer-checkbox rounded border-padi text-hutan focus:ring-padi" checked>
              <span>Jalan</span>
            </label>

            <label class="flex items-center space-x-2 text-xs text-kertas/90 cursor-pointer select-none py-0.5 hover:bg-kertas/5 px-1 rounded">
              <input type="checkbox" value="sungai" class="layer-checkbox rounded border-padi text-hutan focus:ring-padi" checked>
              <span>Sungai</span>
            </label>

            <label class="flex items-center space-x-2 text-xs text-kertas/90 cursor-pointer select-none py-0.5 hover:bg-kertas/5 px-1 rounded">
              <input type="checkbox" value="hutan" class="layer-checkbox rounded border-padi text-hutan focus:ring-padi" checked>
              <span>Kawasan Hutan</span>
            </label>

            <label class="flex items-center space-x-2 text-xs text-kertas/90 cursor-pointer select-none py-0.5 hover:bg-kertas/5 px-1 rounded">
              <input type="checkbox" value="sawah" class="layer-checkbox rounded border-padi text-hutan focus:ring-padi" checked>
              <span>Kawasan Sawah</span>
            </label>

            <label class="flex items-center space-x-2 text-xs text-kertas/90 cursor-pointer select-none py-0.5 hover:bg-kertas/5 px-1 rounded">
              <input type="checkbox" value="pemukiman" class="layer-checkbox rounded border-padi text-hutan focus:ring-padi" checked>
              <span>Kawasan Pemukiman</span>
            </label>

            <label class="flex items-center space-x-2 text-xs text-kertas/90 cursor-pointer select-none py-0.5 hover:bg-kertas/5 px-1 rounded">
              <input type="checkbox" value="karst" class="layer-checkbox rounded border-padi text-hutan focus:ring-padi" checked>
              <span>Kawasan Karst</span>
            </label>

          </div>

          <!-- <select id="layerSelector" class="w-full px-2.5 py-1.5 rounded-md text-kertas text-xs font-medium border border-padi/20 outline-none bg-kertas/5 focus:border-padi focus:bg-hutan">
            <option class="bg-hutan" value="none">Semua Layer</option>
            <option class="bg-hutan" value="wilayah">Batas Wilayah</option>
            <option class="bg-hutan" value="jalan">Jalan</option>
            <option class="bg-hutan" value="sungai">Sungai</option>
            <option class="bg-hutan" value="hutan">Kawasan Hutan</option>
            <option class="bg-hutan" value="sawah">Kawasan Sawah</option>
            <option class="bg-hutan" value="pemukiman">Kawasan Pemukiman</option>
            <option class="bg-hutan" value="karst">Kawasan Karst</option>
          </select> -->
        </div>

        <!-- Navigasi -->
        <div>
          <div class="flex items-center space-x-1.5 mb-1.5">
            <div class="w-1 h-1 bg-padi rounded-full"></div>
            <span class="font-mono text-[12px] uppercase tracking-wider text-padi">Navigasi</span>
          </div>

          <div class="flex items-center gap-2">
            <button onclick="map.setView([-4.869923, 119.618766], 14)"
              title="Reset Peta"
              class="flex-1 h-14 rounded-lg font-semibold text-[12px] uppercase tracking-wide leading-tight text-hutan bg-[linear-gradient(135deg,#C9A45C,#b8924a)] transition-all duration-200 hover:brightness-110 hover:-translate-y-0.5">
              Reset<br>Peta
            </button>

            <div class="grid grid-cols-3 grid-rows-3 gap-0.5 shrink-0">
              <span></span>
              <button onclick="map.panBy([0,-60])" class="w-6 h-6 rounded-md text-xs leading-none bg-kertas/10 border border-padi/25 transition-all duration-200 hover:bg-padi hover:text-hutan">&uarr;</button>
              <span></span>

              <button onclick="map.panBy([-60,0])" class="w-6 h-6 rounded-md text-xs leading-none bg-kertas/10 border border-padi/25 transition-all duration-200 hover:bg-padi hover:text-hutan">&larr;</button>
              <span class="w-6 h-6 rounded-md border border-padi/20 flex items-center justify-center">
                <span class="w-1 h-1 bg-padi rounded-full"></span>
              </span>
              <button onclick="map.panBy([60,0])" class="w-6 h-6 rounded-md text-xs leading-none bg-kertas/10 border border-padi/25 transition-all duration-200 hover:bg-padi hover:text-hutan">&rarr;</button>

              <span></span>
              <button onclick="map.panBy([0,60])" class="w-6 h-6 rounded-md text-xs leading-none bg-kertas/10 border border-padi/25 transition-all duration-200 hover:bg-padi hover:text-hutan">&darr;</button>
              <span></span>
            </div>
          </div>
        </div>

        <!-- Legenda -->
        <div>
          <div class="flex items-center space-x-1.5 mb-1.5">
            <div class="w-1 h-1 bg-padi rounded-full"></div>
            <span class="font-mono text-[12px] uppercase tracking-wider text-padi">Legenda</span>
          </div>
          <ul class="space-y-1 text-[11px] text-kertas/85">
            <li class="flex items-center space-x-2">
              <span class="inline-block w-3.5 h-1.5 rounded-sm bg-padi"></span>
              <span>Batas Wilayah</span>
            </li>
            <li class="flex items-center space-x-2">
              <span class="inline-block w-3.5 h-1.5 rounded-sm bg-tunas"></span>
              <span>Batas Kecamatan</span>
            </li>
            <li class="flex items-center space-x-2">
              <span class="inline-block w-3.5 h-1.5 rounded-sm bg-[#7EC8E3]"></span>
              <span>Danau</span>
            </li>
            <li class="flex items-center space-x-2">
              <span class="inline-block w-3.5 h-1 rounded-sm bg-kertas"></span>
              <span>Jalan</span>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </main>

  <footer class="shrink-0 relative z-10 text-center pb-2 text-[10px] text-kertas/40 font-mono">
    Pemerintah Desa Panaikang &middot; Kecamatan Minasatene &middot; Kabupaten Pangkep
  </footer>






  <script>
    // Inisialisasi peta
    var map = L.map('map', {
      center: [-4.865339, 119.614335],
      zoom: 13,
      minZoom: 10, // Mengunci agar pengguna tidak bisa zoom-out terlalu jauh
      maxZoom: 20, // Mengizinkan zoom-in lebih dekat (misal sampai level bangunan)
      zoomControl: false 
    });
    // Tambahkan tile layer (peta dasar)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // zoom
    L.control.zoom({
      position: 'topright'    
    }).addTo(map);
        
    // skala
    L.control.scale().addTo(map);

    // Mini Map
    var miniMapLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: ''
    });
    var miniMap = new L.Control.MiniMap(miniMapLayer, {
      toggleDisplay: true,
      minimized: false,
      position: 'bottomright'
    }).addTo(map);
  
    // Layer dasar untuk jenis peta
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 20,
      maxNativeZoom: 19,
      attribution: '© OpenStreetMap contributors'
    });

    var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/' + 'World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 20,
      maxNativeZoom: 18,
      attribution: 'Tiles © Esri'
    });
  
    var topo = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/' + 'World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 20,
      maxNativeZoom: 18,
      attribution: 'Tiles © Esri'
    });

    var darkMap = L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png', {
      maxZoom: 20,
      maxNativeZoom: 20,
      attribution: '&copy; Stadia Maps, &copy; OpenMapTiles, &copy; OpenStreetMap'
    });

    var googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
      maxZoom: 20,
      maxNativeZoom: 20,
      attribution: '&copy; Google Maps'
    });

    var cartoPositron = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 20,
      maxNativeZoom: 19,
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      subdomains: 'abcd'
    });

    var googleTerrain = L.tileLayer('https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}', {
      maxZoom: 20,
      maxNativeZoom: 20,
      attribution: '&copy; Google Maps'
    });

    var lightMap = L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png', {
      maxZoom: 20,
      maxNativeZoom: 20,
      attribution: '&copy; Stadia Maps, &copy; OpenMapTiles, &copy; OpenStreetMap contributors'
    });

    var googleSatRaw = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
      maxZoom: 20,
      maxNativeZoom: 20,
      attribution: '&copy; Google Maps'
    });
       
    // default layer
    googleSatRaw.addTo(map);

    // Layer Control
    var baseMaps = {
      "Google Satelit Murni": googleSatRaw,
      "Satellite": satellite,
      "OpenStreetMap": osm,
      "Elegant Dark Mode": darkMap,
      "Google Satelit + Jalan": googleHybrid,
      "Topographic": topo,
      "Google Terrain": googleTerrain,
      "Carto Positron": cartoPositron,
      "Light Map": lightMap
    };
    L.control.layers(baseMaps).addTo(map);
        
    // Kompas
    var kompas = new L.Control.Compass({
      autoActive: true,
      showDigit: true
    });
    map.addControl(kompas);
        
    // Ambil data geojson
    var wilayahLayer, jalanLayer, sungaiLayer, hutanLayer, sawahLayer, pemukimanLayer, karstLayer, fasilitasLayer;
    var allFeatures = [];
    var layerMapping = {};

    function simpanFiturLayer(layer) {
      layer.eachLayer(function (l) {
        allFeatures.push(l);
      });
    }

    // Fungsi untuk buka/tutup menu dropdown kustom
    function toggleDropdown() {
      var menu = document.getElementById('dropdownMenu');
      var arrow = document.getElementById('dropdownArrow');
      
      if (menu.classList.contains('hidden')) {
        menu.classList.remove('hidden');
        arrow.classList.add('rotate-180');
      } else {
        menu.classList.add('hidden');
        arrow.classList.remove('rotate-180');
      }
    }

    // Menutup menu secara otomatis jika klik di luar area dropdown
    window.addEventListener('click', function(e) {
      var btn = document.getElementById('dropdownBtn');
      var menu = document.getElementById('dropdownMenu');
      if (btn && !btn.contains(e.target) && menu && !menu.contains(e.target)) {
        menu.classList.add('hidden');
        document.getElementById('dropdownArrow').classList.remove('rotate-180');
      }
    });

    // Fungsi utama untuk centang checkbox di dropdown dan menampilkan layer di peta
    function updatePetaLayers() {
      let checkedCount = 0;
      let totalCount = 0;

      document.querySelectorAll('.layer-checkbox').forEach(function(checkbox) {
        totalCount++;
        let layerName = checkbox.value;
        let targetLayer = layerMapping[layerName];

        if (checkbox.checked) {
          checkedCount++;
          if (targetLayer && !map.hasLayer(targetLayer)) {
            map.addLayer(targetLayer);
          }
        } else {
          if (targetLayer && map.hasLayer(targetLayer)) {
            map.removeLayer(targetLayer);
          }
        }
      });


      let label = document.getElementById('dropdownLabel');
      if (checkedCount === totalCount) {
        label.innerText = "Semua Layer Terpilih";
      } else if (checkedCount === 0) {
        label.innerText = "Tidak Ada Layer";
      } else {
        label.innerText = checkedCount + " Layer Terpilih";
      }
    }

    document.querySelectorAll('.layer-checkbox').forEach(function(checkbox) {
      checkbox.addEventListener('change', updatePetaLayers);
    });
    
    fetch('asset/kars.json')
      .then(response => response.json())
      .then(data => {
        karstLayer = L.geoJSON(data, {
          style: {
            color: '#F6F3EA',
            weight: 2,
            fillColor: '#F6F3EA',
            fillOpacity: 0.2
          },
        onEachFeature: function (feature, layer) {
          if (feature.properties && feature.properties.nama) {
            layer.bindPopup("<div class='text-xs font-semibold'>Wilayah: " + feature.properties.nama + "</div>");
          }
        }
      }).addTo(map);
      map.fitBounds(karstLayer.getBounds());
      simpanFiturLayer(karstLayer);
      layerMapping['karst'] = karstLayer;
      updatePetaLayers();
    });
    
    fetch('asset/sungai.json')
      .then(response => response.json())
      .then(data => {
        sungaiLayer = L.geoJSON(data, {
          style: {
            color: '#4A90E2',
            weight: 3,
            fillColor: '#4A90E2',
            fillOpacity: 0.2
          },
        onEachFeature: function (feature, layer) {
          if (feature.properties && feature.properties.nama) {
            layer.bindPopup("<div class='text-xs font-semibold'>Wilayah: " + feature.properties.nama + "</div>");
          }
        }
      }).addTo(map);
      map.fitBounds(sungaiLayer.getBounds());
      simpanFiturLayer(sungaiLayer);
      layerMapping['sungai'] = sungaiLayer;
      updatePetaLayers();
    });
    
    fetch('asset/sawahReal.json')
      .then(response => response.json())
      .then(data => {
        sawahLayer = L.geoJSON(data, {
          style: {
            color: '#356946',
            weight: 3,
            fillColor: '#356946',
            fillOpacity: 0.5
          },
        onEachFeature: function (feature, layer) {
          if (feature.properties && feature.properties.nama) {
            layer.bindPopup("<div class='text-xs font-semibold'>Wilayah: " + feature.properties.nama + "</div>");
          }
        }
      }).addTo(map);
      map.fitBounds(sawahLayer.getBounds());
      simpanFiturLayer(sawahLayer);
      layerMapping['sawah'] = sawahLayer;
      updatePetaLayers();
    });
    
    fetch('asset/pemukimanReal.json')
      .then(response => response.json())
      .then(data => {
        pemukimanLayer = L.geoJSON(data, {
          style: {
            color: '#D96B43',
            weight: 1,
            fillColor: '#D96B43',
            fillOpacity: 0.3
          },
        onEachFeature: function (feature, layer) {
          if (feature.properties && feature.properties.nama) {
            layer.bindPopup("<div class='text-xs font-semibold'>Wilayah: " + feature.properties.nama + "</div>");
          }
        }
      }).addTo(map);
      map.fitBounds(pemukimanLayer.getBounds());
      simpanFiturLayer(pemukimanLayer);
      layerMapping['pemukiman'] = pemukimanLayer;
      updatePetaLayers();
    });
    
    fetch('asset/kawasanHutan.json')
      .then(response => response.json())
      .then(data => {
        hutanLayer = L.geoJSON(data, {
          style: {
            color: '#063526',
            weight: 3,
            fillColor: '#063526',
            fillOpacity: 0.2
          },
        onEachFeature: function (feature, layer) {
          if (feature.properties && feature.properties.nama) {
            layer.bindPopup("<div class='text-xs font-semibold'>Wilayah: " + feature.properties.nama + "</div>");
          }
        }
      }).addTo(map);
      map.fitBounds(hutanLayer.getBounds());
      simpanFiturLayer(hutanLayer);
      layerMapping['hutan'] = hutanLayer;
      updatePetaLayers();
    });

    fetch('asset/desaPanaikangReal.json')
      .then(response => response.json())
      .then(data => {
        wilayahLayer = L.geoJSON(data, {
          style: {
            color: '#C9A45C',
            weight: 5,
            fillOpacity: 0
          },
        onEachFeature: function (feature, layer) {
          if (feature.properties && feature.properties.nama) {
            layer.bindPopup("<div class='text-xs font-semibold'>Wilayah: " + feature.properties.nama + "</div>");
          } 
        }
      }).addTo(map);
      map.fitBounds(wilayahLayer.getBounds());
      simpanFiturLayer(wilayahLayer);
      layerMapping['wilayah'] = wilayahLayer;
      updatePetaLayers();
    });
    
    fetch('asset/jalan.json')
      .then(response => response.json())
      .then(data => {
        jalanLayer = L.geoJSON(data, {
          style: {
            color: '#000000',
            weight: 1,
            fillColor: '#000000',
            fillOpacity: 0.2
          },
        onEachFeature: function (feature, layer) {
          if (feature.properties && feature.properties.nama) {
            layer.bindPopup("<div class='text-xs font-semibold'>Wilayah: " + feature.properties.nama + "</div>");
          }
        }
      }).addTo(map);
      map.fitBounds(jalanLayer.getBounds());
      simpanFiturLayer(jalanLayer);
      layerMapping['jalan'] = jalanLayer;
      updatePetaLayers();
    });


    // icon untuk titik fasilitas
    function dapatkanKategori(fungsi) {
      if (!fungsi) return "umum";
      const f = fungsi.toLowerCase();
      if (f.includes("masjid") || f.includes("musholla") || f.includes("ibadah")) return "ibadah";
      if (f.includes("sekolah") || f.includes("sd") || f.includes("taman kanak-kanak") || f.includes("pondok pesantren")) return "pendidikan";
      if (f.includes("pustu") || f.includes("puskesdes") || f.includes("kesehatan") || f.includes("posyandu")) return "kesehatan";
      if (f.includes("kantor") || f.includes("bpd") || f.includes("desa") || f.includes("pemerintah") || f.includes("baruga")) return "pemerintahan";
      if (f.includes("wisata") || f.includes("leang")) return "wisata";
      return "umum";
    }

    const svgIkonKategori = {
      ibadah: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 21h18M4 21v-4a2 2 0 012-2h1v-3a5 5 0 0110 0v3h1a2 2 0 012 2v4"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 21v-3a3 3 0 016 0v3"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8V4"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 3.2a1.3 1.3 0 102 0 1.3 1.3 0 00-2 0z"/></svg>`,
      pendidikan: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0112 20.055a11.952 11.952 0 01-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 10.5V15"/><circle cx="6" cy="16" r="0.6" fill="currentColor"/></svg>`,
      kesehatan: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 8a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V8z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 6V5a2 2 0 012-2h2a2 2 0 012 2v1"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 13h6M12 10v6"/></svg>`,
      pemerintahan: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 22h18"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 22V11l8-6 8 6v11"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 22v-8h2v8M11 22v-8h2v8M15 22v-8h2v8"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2 11l10-6 10 6"/></svg>`,
      wisata: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="17" cy="6" r="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 19l6.5-10 4 5.5L17 10l4 9H3z"/></svg>`,
      umum: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 21h18"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 21V10l8-6 8 6v11"/><circle cx="9" cy="13.5" r="1.4"/><circle cx="15" cy="13.5" r="1.4"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 19c0-1.7 0.9-3 2-3s2 1.3 2 3M13 19c0-1.7 0.9-3 2-3s2 1.3 2 3"/></svg>`,
    };

    const kategori = {
      ibadah:       { warna: "bg-green-600",  border: "border-green-700"  },
      pendidikan:   { warna: "bg-blue-600",   border: "border-blue-700"   },
      kesehatan:    { warna: "bg-red-600",    border: "border-red-700"    },
      pemerintahan: { warna: "bg-amber-600",  border: "border-amber-700"  },
      umum:         { warna: "bg-purple-600", border: "border-purple-700" },
      wisata:       { warna: "bg-teal-600",   border: "border-teal-700"   },
    };

    function buatMarkerIcon(cat, svgIkon) {
      const c = kategori[cat] || kategori.umum; 
      
      return L.divIcon({
        className: "",
        html: `
          <div class="relative w-8 h-8">
            <div class="${c.warna} ${c.border} border-2 w-8 h-8 rounded-full rounded-bl-none -rotate-45 flex items-center justify-center shadow-md">
              <div class="rotate-45 text-white">${svgIkon || ""}</div>
            </div>
          </div>`,
        iconSize: [32, 32],
        iconAnchor: [16, 32],
        popupAnchor: [0, -32],
      });
    }

    // 4. Ambil data fasilitas.json
    fetch('asset/fasilitas.json')
      .then(response => response.json())
      .then(data => {
        fasilitasLayer = L.geoJSON(data, {
          pointToLayer: function (feature, latlng) {
            const kat = dapatkanKategori(feature.properties.fungsi);
            const ikon = svgIkonKategori[kat] || svgIkonKategori.umum;
            
            return L.marker(latlng, { 
              icon: buatMarkerIcon(kat, ikon) 
            });
          },
          onEachFeature: function (feature, layer) {
            if (feature.properties && feature.properties.nama) {
              layer.bindPopup(`
                <div class="p-1 font-sans text-kertas">
                  <h3 class="text-sm font-bold mb-1">${feature.properties.nama}</h3>
                  <p class="text-xs text-kertas/80">Fungsi: <b>${feature.properties.fungsi || '-'}</b></p>
                </div>
              `);
            }
          }
        }).addTo(map);
        simpanFiturLayer(fasilitasLayer);
        layerMapping['fasilitas'] = fasilitasLayer;
        updatePetaLayers();
      })


    // --- FITUR PENCARIAN LOKASI DENGAN HIGHLIGHT & RESET COLOR ---
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const selectedResults = document.getElementById('selectedResults');

    if (searchInput && searchResults) {
      searchInput.addEventListener('input', function (e) {
        const query = e.target.value.toLowerCase().trim();
        searchResults.innerHTML = '';

        if (query === '') {
          searchResults.classList.add('hidden');
          return;
        }

        // Filter seluruh fitur yang memiliki nama sesuai query
        const matches = allFeatures.filter(function (layer) {
          if (layer.feature && layer.feature.properties) {
            const props = layer.feature.properties;
            const nama = props.nama || props.NAMOBJ || props.name || '';
            return nama.toLowerCase().includes(query);
          }
          return false;
        });

        if (matches.length === 0) {
          searchResults.innerHTML = '<li class="px-3 py-2 text-kertas/50 italic">Lokasi tidak ditemukan</li>';
          searchResults.classList.remove('hidden');
          return;
        }

        // Tampilan hasil pencarian
        matches.forEach(function (layer) {
          const props = layer.feature.properties;
          const nama = props.nama || props.NAMOBJ || props.name || 'Tanpa Nama';
          const fungsi = props.fungsi || 'Lokasi';

          const li = document.createElement('li');
          li.className = 'px-3 py-2 hover:bg-padi/20 cursor-pointer transition-colors duration-150 flex flex-col justify-center';
          li.innerHTML = `
            <span class="font-medium text-kertas">${nama}</span>
            <span class="text-[9px] text-padi">${fungsi}</span>
          `;

          // Event saat item pencarian diklik
          li.addEventListener('click', function () {
            if (layer.setStyle && !layer.options.defaultStyle) {
              layer.options.defaultStyle = {
                color: layer.options.color,
                weight: layer.options.weight,
                fillColor: layer.options.fillColor,
                fillOpacity: layer.options.fillOpacity
              };
            }

            // 2. Highlight hasil pencarian
            if (layer.setStyle) {
              const geomType = layer.feature.geometry ? layer.feature.geometry.type : '';
              const isLine = geomType === 'LineString' || geomType === 'MultiLineString';

              layer.setStyle({
                color: '#FFD700',
                weight: isLine ? 6 : 3,
                fillColor: '#FFD700',
                fillOpacity: 0.6
              });

              if (layer.bringToFront) {
                layer.bringToFront();
              }
            }

            if (layer.getBounds) {
              // Jika berupa Poligon / Garis (Wilayah, Jalan, Sungai, dll.)
              map.fitBounds(layer.getBounds(), { maxZoom: 16 });
            } else if (layer.getLatLng) {
              // Jika berupa Point / Marker (Fasilitas) -> ZOOM LEVEL 20
              map.setView(layer.getLatLng(), 20);
            }

            layer.openPopup();

            // 5. Tambahkan ke Daftar Lokasi Terpilih (#selectedResults)
            if (selectedResults) {
              const selectedLi = document.createElement('li');
              selectedLi.className = 'flex justify-between items-center bg-hutan/80 border border-padi/20 px-2 py-1 rounded text-[10px] text-kertas';
              selectedLi.innerHTML = `
                <span class="truncate max-w-[130px] font-medium">${nama}</span>
                <button class="text-red-400 hover:text-red-500 font-bold ml-1 transition-colors" title="Hapus Highlight">✕</button>
              `;

              // Event saat tombol ✕ diklik -> Kembalikan warna asli
              selectedLi.querySelector('button').addEventListener('click', function () {
                if (layer.setStyle && layer.options.defaultStyle) {
                  layer.setStyle(layer.options.defaultStyle);
                }
                selectedLi.remove();
              });

              selectedResults.appendChild(selectedLi);
            }

            searchResults.classList.add('hidden');
            searchInput.value = '';
          });

          searchResults.appendChild(li);
        });

        searchResults.classList.remove('hidden');
      });

      // Sembunyikan dropdown hasil jika klik di luar elemen pencarian
      document.addEventListener('click', function (e) {
        if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
          searchResults.classList.add('hidden');
        }
      });
    }


  </script>
</body>
</html>
